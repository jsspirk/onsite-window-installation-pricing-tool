<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0C0E14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FastGlass Field Pricer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       DESIGN TOKENS
    ================================================================ */
    :root {
      --bg-0: #090B10;
      --bg-1: #0F1219;
      --bg-2: #161B26;
      --bg-3: #1E2433;
      --bg-card: #192030;
      --bg-input: #111520;

      --amber: #F59E0B;
      --amber-dim: #B45309;
      --amber-glow: rgba(245,158,11,0.15);
      --amber-bg: rgba(245,158,11,0.08);

      --green: #10B981;
      --green-bg: rgba(16,185,129,0.1);
      --red: #EF4444;
      --red-bg: rgba(239,68,68,0.1);
      --orange: #F97316;
      --orange-bg: rgba(249,115,22,0.1);
      --blue: #3B82F6;
      --blue-bg: rgba(59,130,246,0.1);

      --text-0: #F0F4FF;
      --text-1: #B0BBCC;
      --text-2: #6B7A8D;
      --text-3: #3D4858;

      --border-0: #252E42;
      --border-1: #1C2435;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 22px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);

      --font-title: 'Barlow Condensed', sans-serif;
      --font-semi: 'Barlow Semi Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;

      --touch-target: 52px;
      --header-height: 60px;
    }

    /* ================================================================
       RESET & BASE
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-tap-highlight-color: transparent; }
    body {
      height: 100%;
      background: var(--bg-0);
      color: var(--text-0);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    input, select, textarea, button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ================================================================
       APP SHELL
    ================================================================ */
    #app {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* ================================================================
       HEADER / NAV BAR
    ================================================================ */
    .app-header {
      height: var(--header-height);
      background: var(--bg-1);
      border-bottom: 1px solid var(--border-1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 0.5px;
      color: var(--amber);
      text-transform: uppercase;
    }
    .header-title {
      font-family: var(--font-semi);
      font-weight: 700;
      font-size: 16px;
      color: var(--text-0);
    }
    .header-back-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text-1);
      border-radius: var(--radius-sm);
      font-size: 22px;
      transition: color 0.15s;
    }
    .header-back-btn:active { color: var(--amber); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .offline-badge {
      background: var(--orange-bg);
      border: 1px solid var(--orange);
      color: var(--orange);
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .online-badge {
      background: var(--green-bg);
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .icon-btn {
      width: var(--touch-target); height: var(--touch-target);
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text-1); font-size: 20px;
      border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:active { color: var(--amber); background: var(--amber-bg); }

    /* ================================================================
       TYPOGRAPHY
    ================================================================ */
    .display-price {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 52px;
      line-height: 1;
      color: var(--amber);
      letter-spacing: -1px;
    }
    .display-price-sm {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 32px;
      line-height: 1;
      color: var(--amber);
    }
    .screen-title {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 0.3px;
      color: var(--text-0);
    }
    .section-label {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .mono {
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }

    /* ================================================================
       BUTTONS
    ================================================================ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: var(--touch-target);
      padding: 0 24px;
      border: none; border-radius: var(--radius-md);
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .btn-primary {
      background: var(--amber);
      color: #000;
    }
    .btn-primary:active { background: var(--amber-dim); transform: scale(0.98); }
    .btn-secondary {
      background: var(--bg-3);
      color: var(--text-0);
      border: 1px solid var(--border-0);
    }
    .btn-secondary:active { background: var(--bg-2); transform: scale(0.98); }
    .btn-danger {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red);
    }
    .btn-danger:active { opacity: 0.75; transform: scale(0.98); }
    .btn-success {
      background: var(--green);
      color: #000;
    }
    .btn-success:active { opacity: 0.85; transform: scale(0.98); }
    .btn-ghost {
      background: none;
      color: var(--amber);
      border: 1px solid var(--amber);
    }
    .btn-ghost:active { background: var(--amber-bg); transform: scale(0.98); }
    .btn-full { width: 100%; }
    .btn-sm { min-height: 40px; padding: 0 16px; font-size: 14px; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }

    /* ================================================================
       FORM ELEMENTS
    ================================================================ */
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label {
      font-family: var(--font-title);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .form-input {
      height: var(--touch-target);
      padding: 0 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border-0);
      border-radius: var(--radius-md);
      color: var(--text-0);
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 500;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--amber);
      background: var(--bg-2);
    }
    .form-input::placeholder { color: var(--text-3); }
    .form-input.error { border-color: var(--red); }

    .form-input-large {
      height: 70px;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 36px;
      text-align: center;
      letter-spacing: -0.5px;
    }
    .input-hint { font-size: 12px; color: var(--text-2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    /* Chip selector */
    .chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      min-height: 44px;
      padding: 0 16px;
      background: var(--bg-3);
      border: 1.5px solid var(--border-0);
      border-radius: 100px;
      color: var(--text-1);
      font-family: var(--font-semi);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:active, .chip.active {
      background: var(--amber-bg);
      border-color: var(--amber);
      color: var(--amber);
    }
    .chip.active { cursor: default; }
    .chip-group.required .chip:not(.active) { opacity: 0.7; }

    /* Unit toggle */
    .unit-toggle {
      display: flex;
      background: var(--bg-input);
      border: 1.5px solid var(--border-0);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .unit-toggle-btn {
      flex: 1; height: 40px;
      background: none; border: none;
      color: var(--text-2);
      font-family: var(--font-title);
      font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.15s;
      letter-spacing: 1px;
    }
    .unit-toggle-btn.active {
      background: var(--amber);
      color: #000;
    }

    /* ================================================================
       CARDS & PANELS
    ================================================================ */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-1);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    .card-tight { padding: 12px 14px; }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

    .divider { height: 1px; background: var(--border-1); margin: 16px 0; }
    .divider-dashed { border-top: 1px dashed var(--border-0); margin: 12px 0; }

    /* ================================================================
       PRICE BREAKDOWN
    ================================================================ */
    .price-row {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 6px 0;
    }
    .price-row-label { font-size: 14px; color: var(--text-1); }
    .price-row-value {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 18px;
      color: var(--text-0);
    }
    .price-total-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0 0;
      border-top: 1px solid var(--border-0);
      margin-top: 8px;
    }
    .price-total-label {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-0);
    }
    .price-total-value {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 32px;
      color: var(--amber);
      letter-spacing: -0.5px;
    }

    /* ================================================================
       PANE LIST ITEMS
    ================================================================ */
    .pane-item {
      background: var(--bg-2);
      border: 1px solid var(--border-0);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .pane-item-num {
      width: 32px; height: 32px;
      background: var(--amber-bg);
      border: 1px solid var(--amber);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 14px;
      color: var(--amber);
      flex-shrink: 0;
    }
    .pane-item-info { flex: 1; min-width: 0; }
    .pane-item-type {
      font-family: var(--font-semi);
      font-weight: 700;
      font-size: 15px;
      color: var(--text-0);
    }
    .pane-item-dims {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 2px;
    }
    .pane-item-price {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 22px;
      color: var(--text-0);
      flex-shrink: 0;
    }
    .pane-item-remove {
      width: 36px; height: 36px;
      background: var(--red-bg);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .pane-item-remove:active { border-color: var(--red); transform: scale(0.9); }

    /* ================================================================
       STATUS BADGES
    ================================================================ */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      border-radius: 100px;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .badge-sent { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
    .badge-draft { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue); }
    .badge-flagged { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange); }
    .badge-shown { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber); }

    /* ================================================================
       HISTORY LIST
    ================================================================ */
    .history-item {
      background: var(--bg-card);
      border: 1px solid var(--border-1);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:active { border-color: var(--amber); background: var(--bg-2); }
    .history-icon {
      width: 40px; height: 40px;
      background: var(--bg-3);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-customer {
      font-family: var(--font-semi);
      font-weight: 700;
      font-size: 16px;
      color: var(--text-0);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-meta { font-size: 13px; color: var(--text-2); margin-top: 2px; }
    .history-price {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 22px;
      color: var(--amber);
      flex-shrink: 0;
      text-align: right;
    }
    .history-price-sub { font-size: 12px; color: var(--text-2); text-align: right; }

    /* ================================================================
       BOTTOM ACTION BAR
    ================================================================ */
    .action-bar {
      position: sticky;
      bottom: 0;
      background: var(--bg-1);
      border-top: 1px solid var(--border-0);
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      z-index: 50;
    }

    /* ================================================================
       RUNNING TOTAL BAR
    ================================================================ */
    .total-bar {
      background: var(--bg-2);
      border-top: 1px solid var(--border-0);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .total-bar-label { font-size: 13px; color: var(--text-2); font-family: var(--font-title); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .total-bar-price { font-family: var(--font-title); font-weight: 800; font-size: 28px; color: var(--amber); }
    .total-bar-meta { font-size: 12px; color: var(--text-3); }

    /* ================================================================
       SCROLL AREA
    ================================================================ */
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-content-pb { padding-bottom: 32px; }

    /* ================================================================
       EMPTY STATE
    ================================================================ */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      padding: 48px 32px;
      gap: 12px;
    }
    .empty-icon { font-size: 48px; opacity: 0.5; }
    .empty-title {
      font-family: var(--font-title); font-weight: 700;
      font-size: 20px; color: var(--text-1);
    }
    .empty-sub { font-size: 14px; color: var(--text-2); max-width: 240px; }

    /* ================================================================
       ALERTS
    ================================================================ */
    .alert {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      font-size: 14px; line-height: 1.5;
      margin-bottom: 12px;
    }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .alert-warning { background: var(--orange-bg); border: 1px solid var(--orange); color: var(--orange); }
    .alert-info { background: var(--blue-bg); border: 1px solid var(--blue); color: var(--blue); }
    .alert-danger { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); }
    .alert-success { background: var(--green-bg); border: 1px solid var(--green); color: var(--green); }

    /* ================================================================
       MODAL / OVERLAY
    ================================================================ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex; align-items: flex-end;
      animation: fadeInOverlay 0.2s ease;
    }
    @keyframes fadeInOverlay { from { opacity:0 } to { opacity:1 } }
    .modal-sheet {
      width: 100%;
      background: var(--bg-2);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 24px 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity:0 } to { transform: translateY(0); opacity:1 } }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border-0);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    /* ================================================================
       TABS
    ================================================================ */
    .tabs {
      display: flex;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border-1);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 14px 20px;
      background: none; border: none;
      font-family: var(--font-semi);
      font-weight: 600; font-size: 15px;
      color: var(--text-2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    /* ================================================================
       ADMIN TABLE
    ================================================================ */
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      text-align: left;
      padding: 10px 12px;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-2);
      border-bottom: 1px solid var(--border-0);
    }
    .admin-table td {
      padding: 12px;
      font-size: 15px;
      color: var(--text-0);
      border-bottom: 1px solid var(--border-1);
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--bg-3); }

    /* ================================================================
       LOGIN SCREEN
    ================================================================ */
    .login-screen {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg-0);
      padding: 48px 24px 32px;
    }
    .login-logo-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-bottom: 32px;
    }
    .login-logo-mark {
      width: 72px; height: 72px;
      background: var(--amber-bg);
      border: 2px solid var(--amber);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 8px;
    }
    .login-brand {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 38px;
      letter-spacing: 2px;
      color: var(--amber);
      text-transform: uppercase;
    }
    .login-tagline {
      font-family: var(--font-title);
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .login-form {
      display: flex; flex-direction: column; gap: 14px;
    }
    .login-demo-hint {
      background: var(--bg-2);
      border: 1px solid var(--border-0);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-2);
    }

  } catch { return null; }
}

function saveState(state) {
  try {
    localStorage.setItem('fg_state', JSON.stringify(state));
  } catch (e) { console.warn('Storage write failed', e); }
}

function initState() {
  const saved = loadState();

/* ================================================================
   PRICING ENGINE
================================================================ */
function calcPane(width_in, height_in, glassTypeId, floorModId, accessModId, catalog) {
  const gt = catalog.glassTypes.find(g => g.id === glassTypeId);
  if (!gt) return null;
  const sqft = (width_in * height_in) / 144;
  const productCost = sqft * gt.costPerSqft;
  const perimeter = 2 * (width_in + height_in);
  const materialsCost = perimeter * catalog.materialsRate.costPerLinearInch;
  const floorMod = catalog.modifiers.floorLevel.find(m => m.id === floorModId) || catalog.modifiers.floorLevel[0];
  const accessMod = catalog.modifiers.accessDifficulty.find(m => m.id === accessModId) || catalog.modifiers.accessDifficulty[0];
  const laborCost = catalog.laborRate.baseRatePerPane * floorMod.multiplier * accessMod.multiplier;
  return {
    sqft: +sqft.toFixed(4),
    productCost: +productCost.toFixed(2),
    materialsCost: +materialsCost.toFixed(2),
    laborCost: +laborCost.toFixed(2),
    lineTotal: +(productCost + materialsCost + laborCost).toFixed(2),
  };
}

function calcJob(panes, floorModId, accessModId, catalog) {
  let totalProduct = 0, totalLabor = 0, totalMaterials = 0;
  const lineItems = panes.map(p => {
    const w = p.unit === 'cm' ? p.width * 0.393701 : p.width;
    const h = p.unit === 'cm' ? p.height * 0.393701 : p.height;
    const r = calcPane(w, h, p.glassTypeId, floorModId, accessModId, catalog);
    if (!r) return null;
    totalProduct += r.productCost;
    totalLabor += r.laborCost;
    totalMaterials += r.materialsCost;
    return { ...p, ...r };
  });
  const grandTotal = totalProduct + totalLabor + totalMaterials;
  return {
    lineItems,
    totalProduct: +totalProduct.toFixed(2),
    totalLabor: +totalLabor.toFixed(2),
    totalMaterials: +totalMaterials.toFixed(2),
    grandTotal: +grandTotal.toFixed(2),
  };
}

function inToCm(v) { return (v / 0.393701).toFixed(1); }
function toIn(v, unit) { return unit === 'cm' ? v * 0.393701 : v; }

function fmtDate(iso) {

}

function genPaneId() {

function getGlassLabel(id) {
  const g = appData.catalog.glassTypes.find(x => x.id === id);
  return g ? g.label : id;
}
function getModLabel(type, id) {
  const arr = type === 'floor' ? appData.catalog.modifiers.floorLevel : appData.catalog.modifiers.accessDifficulty;
  const m = arr.find(x => x.id === id);
  return m ? m.label : id;
}
function isLargePaneWarning(w_in, h_in) {
  return w_in > MAX_PANE_SIZE_IN || h_in > MAX_PANE_SIZE_IN;

function getCatalogWarning() {
  if (!app.isOnline) {
    const last = new Date(appData.lastSync);
    const days = Math.floor((Date.now() - last) / 86400000);

function draftJobCalc() {
  if (!app.draft || app.draft.panes.length === 0) return null;
  return calcJob(app.draft.panes, app.draft.floorLevel, app.draft.accessDifficulty, appData.catalog);
}

function draftCurrentPaneCalc() {
  const cp = app.draft?.currentPane;
  if (!cp || !cp.glassTypeId || !cp.width || !cp.height) return null;
  const w = toIn(parseFloat(cp.width), cp.unit);
  const h = toIn(parseFloat(cp.height), cp.unit);
  if (!w || !h || w <= 0 || h <= 0) return null;
  return calcPane(w, h, cp.glassTypeId, app.draft.floorLevel, app.draft.accessDifficulty, appData.catalog);
}

/* ================================================================
   SCREEN: NEW QUOTE
================================================================ */
function renderNewQuote() {
  const d = app.draft;
  if (!d) return '';
  if (d.step === 1) return renderNewQuoteStep1();
  if (d.step === 2) return renderNewQuoteStep2();
  return renderReview();
}

function stepIndicator(active) {
  const steps = ['Pane Details', 'Pane List', 'Review & Send'];
  return `
  <div class="step-indicator">
    ${steps.map((s, i) => `
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="step-dot ${i < active ? 'done' : i === active ? 'active' : 'pending'}">${i < active ? '✓' : i+1}</div>
        <div class="step-label" style="color:${i === active ? 'var(--amber)' : 'var(--text-3)'}">${s}</div>
      </div>
      ${i < steps.length - 1 ? `<div class="step-line flex:1 ${i < active ? 'done' : 'pending'}" style="flex:1;margin:0 4px;margin-bottom:18px;"></div>` : ''}
    `).join('')}
  </div>`;
}

function renderNewQuoteStep1() {
  const d = app.draft;
  const cp = d.currentPane;
  const paneCalc = draftCurrentPaneCalc();
  const jobCalc = draftJobCalc();

          <div class="glass-option-price">${fmt(g.costPerSqft)}/sqft</div>

      <div class="form-group">
        <label class="form-label">Height (${cp.unit})</label>
        <input class="form-input form-input-large" id="pane-height" type="number"

        <div class="chip ${d.accessDifficulty === m.id ? 'active' : ''}" data-access="${m.id}">

        <span class="price-row-value">${fmt(paneCalc.laborCost)}</span>
      </div>
      <div class="price-row">
        <span class="price-row-label">Materials</span>
        <span class="price-row-value">${fmt(paneCalc.materialsCost)}</span>
      </div>
      <div class="price-total-row">
        <span class="price-total-label">Pane Total</span>
        <span class="price-total-value">${fmt(paneCalc.lineTotal)}</span>
      </div>
    </div>
    ` : ''}

    ${d.panes.length > 0 ? `
    <div style="margin-top:12px; padding:10px 14px; background:var(--bg-2); border-radius:var(--radius-md); display:flex; justify-content:space-between; align-items:center;">
      <span class="text-muted text-sm">${d.panes.length} pane${d.panes.length > 1 ? 's' : ''} added</span>
      <span style="font-family:var(--font-title); font-weight:800; font-size:20px; color:var(--amber);">

      </span>
    </div>
    ` : ''}

    <div style="display:flex; gap:8px;">
      <button class="btn btn-secondary" id="add-pane-btn" ${!canAddPane ? 'disabled' : ''} style="flex:1;">
        + Add Pane ${d.panes.length > 0 ? `(${d.panes.length})` : ''}
      </button>
      <button class="btn btn-primary" id="review-quote-btn" ${!canReview ? 'disabled' : ''} style="flex:2;">
        Review Quote →
      </button>
    </div>
    ${!canAddPane && !canReview ? `<p style="text-align:center;font-size:13px;color:var(--text-3);">Select glass type and enter dimensions to continue</p>` : ''}

function renderNewQuoteStep2() {

/* ================================================================
   EVENT HANDLERS
================================================================ */
function attachEvents() {
  const on = (id, ev, fn) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener(ev, fn);
  };
  const delegate = (selector, ev, fn) => {
    document.querySelectorAll(selector).forEach(el => el.addEventListener(ev, fn));
  };

  // ---- LOGIN ----
  on('login-btn', 'click', handleLogin);
  on('login-pass', 'keydown', e => { if (e.key === 'Enter') handleLogin(); });
  on('login-user', 'keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass')?.focus(); });

  // ---- HOME ----
  on('start-new-quote', 'click', () => {
    app.draft = newDraft();
    navigate('new-quote');
  });
  on('home-logout-btn', 'click', () => {
    app.currentUser = null;
    app.draft = null;
    navigate('login');
  });
  on('home-admin-btn', 'click', () => navigate('admin'));
  on('home-admin-btn2', 'click', () => navigate('admin'));
  on('view-all-history', 'click', () => navigate('history'));

  // History items on home
  delegate('[data-quote-id]', 'click', e => {
    const id = e.currentTarget.dataset.quoteId;
    viewQuoteFromHistory(id);
  });

  // ---- NEW QUOTE STEP 1 ----
  on('back-home', 'click', () => {
    if (app.draft && (app.draft.customerName || app.draft.panes.length > 0)) {
      if (!confirm('Leave this quote? Progress will be lost.')) return;
    }
    app.draft = null;
    navigate('home');
  });

  // Customer inputs
  on('cust-name', 'input', e => app.draft.customerName = e.target.value);
  on('cust-contact', 'input', e => app.draft.customerContact = e.target.value);
  on('cust-contact-type', 'change', e => app.draft.contactType = e.target.value);

  // Glass type selection
  delegate('[data-glass]', 'click', e => {
    if (!app.draft) return;
    app.draft.currentPane.glassTypeId = e.currentTarget.dataset.glass;
    render();
  });

  // Unit toggle
  on('unit-in', 'click', () => {
    if (app.draft.currentPane.unit !== 'in') {
      const w = parseFloat(app.draft.currentPane.width);
      const h = parseFloat(app.draft.currentPane.height);
      if (w) app.draft.currentPane.width = (w * 0.393701).toFixed(1);
      if (h) app.draft.currentPane.height = (h * 0.393701).toFixed(1);
      app.draft.currentPane.unit = 'in';
      render();
    }
  });
  on('unit-cm', 'click', () => {
    if (app.draft.currentPane.unit !== 'cm') {
      const w = parseFloat(app.draft.currentPane.width);
      const h = parseFloat(app.draft.currentPane.height);
      if (w) app.draft.currentPane.width = (w / 0.393701).toFixed(1);
      if (h) app.draft.currentPane.height = (h / 0.393701).toFixed(1);
      app.draft.currentPane.unit = 'cm';
      render();
    }
  });

  // Dimension inputs - live update for price preview
  on('pane-width', 'input', e => {
    app.draft.currentPane.width = e.target.value;
    // Debounced re-render for price preview
    clearTimeout(app._renderTimer);
    app._renderTimer = setTimeout(() => render(), 300);
  });
  on('pane-height', 'input', e => {
    app.draft.currentPane.height = e.target.value;
    clearTimeout(app._renderTimer);
    app._renderTimer = setTimeout(() => render(), 300);
  });

  // Floor/access modifiers
  delegate('[data-floor]', 'click', e => {
    app.draft.floorLevel = e.currentTarget.dataset.floor;
    render();
  });
  delegate('[data-access]', 'click', e => {
    app.draft.accessDifficulty = e.currentTarget.dataset.access;
    render();
  });

  // Add pane
  on('add-pane-btn', 'click', () => {
    if (app.draft.panes.length >= 20) {
      alert('Maximum 20 panes per quote.');
      return;
    }
    const cp = app.draft.currentPane;
    if (!cp.glassTypeId || !cp.width || !cp.height) return;
    app.draft.panes.push({
      id: genPaneId(),
      glassTypeId: cp.glassTypeId,
      width: cp.width,
      height: cp.height,
      unit: cp.unit,
    });
    // Reset current pane form (keep glass type selected for convenience)
    app.draft.currentPane = { glassTypeId: cp.glassTypeId, width: '', height: '', unit: cp.unit };
    render();
  });

  // Review quote (from step 1)
  on('review-quote-btn', 'click', () => {
    // If current pane has data, add it first
    const cp = app.draft.currentPane;
    if (cp.glassTypeId && cp.width && cp.height && parseFloat(cp.width) > 0 && parseFloat(cp.height) > 0) {
      app.draft.panes.push({
        id: genPaneId(),
        glassTypeId: cp.glassTypeId,
        width: cp.width,
        height: cp.height,
        unit: cp.unit,
      });
      app.draft.currentPane = { glassTypeId: null, width: '', height: '', unit: cp.unit };
    }
    if (app.draft.panes.length === 0) return;
    app.draft.step = 2;
    navigate('new-quote');
  });

  // Flag large pane
  on('flag-large-pane', 'click', () => {
    const d = app.draft;
    const jobCalc = draftJobCalc();
    const finalQuote = finalizeDraft('flagged');
    navigate('sent', { quoteId: finalQuote.id });
  });

  // ---- STEP 2 ----
  on('back-step1', 'click', () => {
    app.draft.step = 1;
    navigate('new-quote');
  });
  on('add-another-pane-btn', 'click', () => {
    app.draft.step = 1;
    navigate('new-quote');
  });
  on('proceed-to-review', 'click', () => {
    app.draft.step = 3;
    navigate('review');
  });
  delegate('[data-remove-pane]', 'click', e => {
    const pid = e.currentTarget.dataset.removePane;
    app.draft.panes = app.draft.panes.filter(p => p.id !== pid);
    if (app.draft.panes.length === 0) {
      app.draft.step = 1;
      navigate('new-quote');
    } else {
      render();
    }
  });

  // ---- REVIEW ----
  on('back-to-pane-list', 'click', () => {
    app.draft.step = 2;
    navigate('new-quote');
  });

  on('show-customer-btn', 'click', () => {
    // Show presentation mode
    app.customerViewOpen = true;
    app.customerViewQuoteId = '__draft__';
    render();
  });

  on('send-quote-btn', 'click', () => {
    app.sendModal = true;
    render();
  });

  on('flag-review-btn', 'click', () => {
    const finalQuote = finalizeDraft('flagged');
    navigate('sent', { quoteId: finalQuote.id });
  });

  // Send modal
  on('send-modal-overlay', 'click', e => {
    if (e.target.id === 'send-modal-overlay') { app.sendModal = false; render(); }
  });
  on('close-send-modal', 'click', () => { app.sendModal = false; render(); });
  on('send-sms-btn', 'click', () => {
    const finalQuote = finalizeDraft('sent');
    navigate('sent', { quoteId: finalQuote.id });
  });
  on('show-screen-btn', 'click', () => {
    // Show presentation first, then save as 'shown' when closed
    app.pendingSaveAsShown = true;
    app.customerViewOpen = true;
    app.customerViewQuoteId = '__draft__';
    app.sendModal = false;
    render();
  });
  on('send-with-contact-btn', 'click', () => {
    const contact = document.getElementById('modal-contact')?.value;
    const type = document.getElementById('modal-contact-type')?.value;
    if (!contact) { alert('Please enter a contact to send to.'); return; }
    app.draft.customerContact = contact;
    app.draft.contactType = type;
    const finalQuote = finalizeDraft('sent');
    navigate('sent', { quoteId: finalQuote.id });
  });

  // ---- SENT ----
  on('start-new-quote-from-sent', 'click', () => {
    app.draft = newDraft();
    navigate('new-quote');
  });
  on('view-history-btn', 'click', () => navigate('history'));

  // ---- HISTORY ----
  on('back-home-from-history', 'click', () => navigate('home'));
  on('history-search', 'input', e => {
    app.historySearch = e.target.value;
    render();
  });

  // ---- ADMIN ----
  on('back-home-admin', 'click', () => navigate('home'));
  delegate('[data-tab]', 'click', e => {
    app.activeTab = parseInt(e.currentTarget.dataset.tab);
    app.editMode = null;
    render();
  });

  // Admin glass type edits
  delegate('[data-edit-glass]', 'click', e => {
    app.editMode = 'gt_' + e.currentTarget.dataset.editGlass;
    render();
  });
  delegate('[data-save-glass]', 'click', e => {
    const id = e.currentTarget.dataset.saveGlass;
    const val = parseFloat(document.getElementById('gt-edit-' + id)?.value);
    if (val > 0) {
      const g = appData.catalog.glassTypes.find(x => x.id === id);
      if (g) { g.costPerSqft = val; appData.catalog.version++; appData.catalog.lastUpdated = new Date().toISOString(); saveState(appData); }
    }
    app.editMode = null;
    render();
  });
  delegate('[data-toggle-glass]', 'change', e => {
    const id = e.currentTarget.dataset.toggleGlass;
    const g = appData.catalog.glassTypes.find(x => x.id === id);
    if (g) { g.active = e.currentTarget.checked; saveState(appData); render(); }
  });

  // Admin labor edit
  on('edit-labor', 'click', () => { app.editMode = 'labor'; render(); });
  on('save-labor', 'click', () => {
    const val = parseFloat(document.getElementById('labor-edit')?.value);
    if (val > 0) {
      appData.catalog.laborRate.baseRatePerPane = val;
      appData.catalog.laborRate.effectiveDate = new Date().toISOString();
      appData.catalog.version++;
      saveState(appData);
    }
    app.editMode = null;
    render();
  });

  // Admin materials edit
  on('edit-mat', 'click', () => { app.editMode = 'mat'; render(); });
  on('save-mat', 'click', () => {
    const val = parseFloat(document.getElementById('mat-edit')?.value);
    if (val > 0) {
      appData.catalog.materialsRate.costPerLinearInch = val;
      appData.catalog.materialsRate.effectiveDate = new Date().toISOString();
      appData.catalog.version++;
      saveState(appData);
    }
    app.editMode = null;
    render();
  });
}

function attachCustomerViewEvents() {
  const closeBtn = document.getElementById('cv-close-btn');
  if (closeBtn) {
    closeBtn.addEventListener('click', () => {
      if (app.pendingSaveAsShown) {
        const finalQuote = finalizeDraft('shown');
        app.pendingSaveAsShown = false;
        app.customerViewOpen = false;
        app.customerViewQuoteId = null;
        navigate('sent', { quoteId: finalQuote.id });
      } else {
        app.customerViewOpen = false;
        app.customerViewQuoteId = null;
        render();
      }
    });
  }
}

/* ================================================================
   AUTH
================================================================ */
function handleLogin() {
  const username = document.getElementById('login-user')?.value.trim();
  const password = document.getElementById('login-pass')?.value;
  const errEl = document.getElementById('login-error');

  const user = appData.users.find(u => u.username === username && u.password === password);
  if (user) {
    app.currentUser = user;
    navigate('home');
  } else {
    if (errEl) errEl.textContent = 'Invalid username or password. Try tech1/demo or admin/demo.';
  }
}

/* ================================================================
   FINALIZE DRAFT → SAVE QUOTE
================================================================ */
function finalizeDraft(status) {
  const d = app.draft;
  const jobCalc = calcJob(d.panes, d.floorLevel, d.accessDifficulty, appData.catalog);
  const quote = {
    id: d.id,
    techId: app.currentUser.id,
    techName: app.currentUser.name,
    customerName: d.customerName,
    customerContact: d.customerContact,
    contactType: d.contactType,
    jobDate: d.jobDate,
    status: status,
    floorLevel: d.floorLevel,
    accessDifficulty: d.accessDifficulty,
    panes: d.panes,
    totalProduct: jobCalc.totalProduct,
    totalLabor: jobCalc.totalLabor,
    totalMaterials: jobCalc.totalMaterials,
    grandTotal: jobCalc.grandTotal,
    catalogVersion: d.catalogVersion,
    createdAt: new Date().toISOString(),
    syncedAt: app.isOnline ? new Date().toISOString() : null,
  };

  // Remove any existing quote with same id (resend scenario)
  appData.quotes = appData.quotes.filter(q => q.id !== quote.id);
  appData.quotes.unshift(quote);
  saveState(appData);
  app.draft = null;
  return quote;
}

/* ================================================================
   VIEW QUOTE FROM HISTORY (REOPEN)
================================================================ */
function viewQuoteFromHistory(quoteId) {
  const q = appData.quotes.find(x => x.id === quoteId);
  if (!q) return;
  // Rebuild a draft from the historical quote for re-presentation
  app.draft = {
    id: q.id,
    customerName: q.customerName || '',
    customerContact: q.customerContact || '',
    contactType: q.contactType || 'phone',
    jobDate: q.jobDate,
    floorLevel: q.floorLevel,
    accessDifficulty: q.accessDifficulty,
    panes: q.panes,
    currentPane: { glassTypeId: null, width: '', height: '', unit: 'in' },
    step: 3,
    catalogVersion: q.catalogVersion,
    status: q.status,
  };
  navigate('review');
}

/* ================================================================
   ONLINE/OFFLINE DETECTION
================================================================ */
window.addEventListener('online', () => {
  app.isOnline = true;
  appData.lastSync = new Date().toISOString();
  saveState(appData);
  render();
});
window.addEventListener('offline', () => {
  app.isOnline = false;
  render();
});

/* ================================================================
   INIT
================================================================ */
function init() {
  // Check for saved session
  const savedSession = sessionStorage.getItem('fg_user');
  if (savedSession) {
    try {
      app.currentUser = JSON.parse(savedSession);
    } catch {}
  }

  render();

  // Save session on user change
  const originalNavigate = navigate;
}

// Persist session across page refreshes
window.addEventListener('beforeunload', () => {
  if (app.currentUser) {
    sessionStorage.setItem('fg_user', JSON.stringify(app.currentUser));
  } else {
    sessionStorage.removeItem('fg_user');
  }
});

init();
</script>
