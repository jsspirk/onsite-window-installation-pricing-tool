<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0C0E14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FastGlass Field Pricer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       DESIGN TOKENS
    ================================================================ */
    :root {
      --bg-0: #090B10;
      --bg-1: #0F1219;
      --bg-2: #161B26;
      --bg-3: #1E2433;
      --bg-card: #192030;
      --bg-input: #111520;

      --amber: #F59E0B;
      --amber-dim: #B45309;
      --amber-glow: rgba(245,158,11,0.15);
      --amber-bg: rgba(245,158,11,0.08);

      --green: #10B981;
      --green-bg: rgba(16,185,129,0.1);
      --red: #EF4444;
      --red-bg: rgba(239,68,68,0.1);
      --orange: #F97316;
      --orange-bg: rgba(249,115,22,0.1);
      --blue: #3B82F6;
      --blue-bg: rgba(59,130,246,0.1);

      --text-0: #F0F4FF;
      --text-1: #B0BBCC;
      --text-2: #6B7A8D;
      --text-3: #3D4858;

      --border-0: #252E42;
      --border-1: #1C2435;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 22px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);

      --font-title: 'Barlow Condensed', sans-serif;
      --font-semi: 'Barlow Semi Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;

      --touch-target: 52px;
      --header-height: 60px;
    }

    /* ================================================================
       RESET & BASE
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-tap-highlight-color: transparent; }
    body {
      height: 100%;
      background: var(--bg-0);
      color: var(--text-0);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    input, select, textarea, button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ================================================================
       APP SHELL
    ================================================================ */
    #app {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* ================================================================
       HEADER / NAV BAR
    ================================================================ */
    .app-header {
      height: var(--header-height);
      background: var(--bg-1);
      border-bottom: 1px solid var(--border-1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 0.5px;
      color: var(--amber);
      text-transform: uppercase;
    }
    .header-title {
      font-family: var(--font-semi);
      font-weight: 700;
      font-size: 16px;
      color: var(--text-0);
    }
    .header-back-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text-1);
      border-radius: var(--radius-sm);
      font-size: 22px;
      transition: color 0.15s;
    }
    .header-back-btn:active { color: var(--amber); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .offline-badge {
      background: var(--orange-bg);
      border: 1px solid var(--orange);
      color: var(--orange);
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .online-badge {
      background: var(--green-bg);
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .icon-btn {
      width: var(--touch-target); height: var(--touch-target);
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text-1); font-size: 20px;
      border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:active { color: var(--amber); background: var(--amber-bg); }

    /* ================================================================
       TYPOGRAPHY
    ================================================================ */
    .display-price {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 52px;
      line-height: 1;
      color: var(--amber);
      letter-spacing: -1px;
    }
    .display-price-sm {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 32px;
      line-height: 1;
      color: var(--amber);
    }
    .screen-title {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 0.3px;
      color: var(--text-0);
    }
    .section-label {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .mono {
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }

    /* ================================================================
       BUTTONS
    ================================================================ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: var(--touch-target);
      padding: 0 24px;
      border: none; border-radius: var(--radius-md);
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .btn-primary {
      background: var(--amber);
      color: #000;
    }
    .btn-primary:active { background: var(--amber-dim); transform: scale(0.98); }
    .btn-secondary {
      background: var(--bg-3);
      color: var(--text-0);
      border: 1px solid var(--border-0);
    }
    .btn-secondary:active { background: var(--bg-2); transform: scale(0.98); }
    .btn-danger {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red);
    }
    .btn-danger:active { opacity: 0.75; transform: scale(0.98); }
    .btn-success {
      background: var(--green);
      color: #000;
    }
    .btn-success:active { opacity: 0.85; transform: scale(0.98); }
    .btn-ghost {
      background: none;
      color: var(--amber);
      border: 1px solid var(--amber);
    }
    .btn-ghost:active { background: var(--amber-bg); transform: scale(0.98); }
    .btn-full { width: 100%; }
    .btn-sm { min-height: 40px; padding: 0 16px; font-size: 14px; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }

    /* ================================================================
       FORM ELEMENTS
    ================================================================ */
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label {
      font-family: var(--font-title);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .form-input {
      height: var(--touch-target);
      padding: 0 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border-0);
      border-radius: var(--radius-md);
      color: var(--text-0);
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 500;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--amber);
      background: var(--bg-2);
    }
    .form-input::placeholder { color: var(--text-3); }
    .form-input.error { border-color: var(--red); }

    .form-input-large {
      height: 70px;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 36px;
      text-align: center;
      letter-spacing: -0.5px;
    }
    .input-hint { font-size: 12px; color: var(--text-2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    /* Stack to single column on narrow mobile, side-by-side on wider screens */
    .form-row-stack { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 480px) { .form-row-stack { grid-template-columns: 1fr 1fr; } }

    /* Chip selector */
    .chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      min-height: 44px;
      padding: 0 16px;
      background: var(--bg-3);
      border: 1.5px solid var(--border-0);
      border-radius: 100px;
      color: var(--text-1);
      font-family: var(--font-semi);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:active, .chip.active {
      background: var(--amber-bg);
      border-color: var(--amber);
      color: var(--amber);
    }
    .chip.active { cursor: default; }
    .chip-group.required .chip:not(.active) { opacity: 0.7; }

    /* Unit toggle */
    .unit-toggle {
      display: flex;
      background: var(--bg-input);
      border: 1.5px solid var(--border-0);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .unit-toggle-btn {
      flex: 1; height: 40px;
      background: none; border: none;
      color: var(--text-2);
      font-family: var(--font-title);
      font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.15s;
      letter-spacing: 1px;
    }
    .unit-toggle-btn.active {
      background: var(--amber);
      color: #000;
    }

    /* ================================================================
       CARDS & PANELS
    ================================================================ */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-1);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    .card-tight { padding: 12px 14px; }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

    .divider { height: 1px; background: var(--border-1); margin: 16px 0; }
    .divider-dashed { border-top: 1px dashed var(--border-0); margin: 12px 0; }

    /* ================================================================
       PRICE BREAKDOWN
    ================================================================ */
    .price-row {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 6px 0;
    }
    .price-row-label { font-size: 14px; color: var(--text-1); }
    .price-row-value {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 18px;
      color: var(--text-0);
    }
    .price-total-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0 0;
      border-top: 1px solid var(--border-0);
      margin-top: 8px;
    }
    .price-total-label {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-0);
    }
    .price-total-value {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 32px;
      color: var(--amber);
      letter-spacing: -0.5px;
    }

    /* ================================================================
       PANE LIST ITEMS
    ================================================================ */
    .pane-item {
      background: var(--bg-2);
      border: 1px solid var(--border-0);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .pane-item-num {
      width: 32px; height: 32px;
      background: var(--amber-bg);
      border: 1px solid var(--amber);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 14px;
      color: var(--amber);
      flex-shrink: 0;
    }
    .pane-item-info { flex: 1; min-width: 0; }
    .pane-item-type {
      font-family: var(--font-semi);
      font-weight: 700;
      font-size: 15px;
      color: var(--text-0);
    }
    .pane-item-dims {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 2px;
    }
    .pane-item-price {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 22px;
      color: var(--text-0);
      flex-shrink: 0;
    }
    .pane-item-remove {
      width: 36px; height: 36px;
      background: var(--red-bg);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .pane-item-remove:active { border-color: var(--red); transform: scale(0.9); }

    /* ================================================================
       STATUS BADGES
    ================================================================ */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      border-radius: 100px;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .badge-sent { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
    .badge-draft { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue); }
    .badge-flagged { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange); }
    .badge-shown { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber); }

    /* ================================================================
       HISTORY LIST
    ================================================================ */
    .history-item {
      background: var(--bg-card);
      border: 1px solid var(--border-1);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:active { border-color: var(--amber); background: var(--bg-2); }
    .history-icon {
      width: 40px; height: 40px;
      background: var(--bg-3);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-customer {
      font-family: var(--font-semi);
      font-weight: 700;
      font-size: 16px;
      color: var(--text-0);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-meta { font-size: 13px; color: var(--text-2); margin-top: 2px; }
    .history-price {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 22px;
      color: var(--amber);
      flex-shrink: 0;
      text-align: right;
    }
    .history-price-sub { font-size: 12px; color: var(--text-2); text-align: right; }

    /* ================================================================
       BOTTOM ACTION BAR
    ================================================================ */
    .action-bar {
      position: sticky;
      bottom: 0;
      background: var(--bg-1);
      border-top: 1px solid var(--border-0);
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      z-index: 50;
    }

    /* ================================================================
       RUNNING TOTAL BAR
    ================================================================ */
    .total-bar {
      background: var(--bg-2);
      border-top: 1px solid var(--border-0);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .total-bar-label { font-size: 13px; color: var(--text-2); font-family: var(--font-title); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .total-bar-price { font-family: var(--font-title); font-weight: 800; font-size: 28px; color: var(--amber); }
    .total-bar-meta { font-size: 12px; color: var(--text-3); }

    /* ================================================================
       SCROLL AREA
    ================================================================ */
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-content-pb { padding-bottom: 32px; }

    /* ================================================================
       EMPTY STATE
    ================================================================ */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      padding: 48px 32px;
      gap: 12px;
    }
    .empty-icon { font-size: 48px; opacity: 0.5; }
    .empty-title {
      font-family: var(--font-title); font-weight: 700;
      font-size: 20px; color: var(--text-1);
    }
    .empty-sub { font-size: 14px; color: var(--text-2); max-width: 240px; }

    /* ================================================================
       ALERTS
    ================================================================ */
    .alert {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      font-size: 14px; line-height: 1.5;
      margin-bottom: 12px;
    }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .alert-warning { background: var(--orange-bg); border: 1px solid var(--orange); color: var(--orange); }
    .alert-info { background: var(--blue-bg); border: 1px solid var(--blue); color: var(--blue); }
    .alert-danger { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); }
    .alert-success { background: var(--green-bg); border: 1px solid var(--green); color: var(--green); }

    /* ================================================================
       MODAL / OVERLAY
    ================================================================ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex; align-items: flex-end;
      animation: fadeInOverlay 0.2s ease;
    }
    @keyframes fadeInOverlay { from { opacity:0 } to { opacity:1 } }
    .modal-sheet {
      width: 100%;
      background: var(--bg-2);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 24px 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity:0 } to { transform: translateY(0); opacity:1 } }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border-0);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    /* ================================================================
       TABS
    ================================================================ */
    .tabs {
      display: flex;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border-1);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 14px 20px;
      background: none; border: none;
      font-family: var(--font-semi);
      font-weight: 600; font-size: 15px;
      color: var(--text-2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    /* ================================================================
       ADMIN TABLE
    ================================================================ */
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      text-align: left;
      padding: 10px 12px;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-2);
      border-bottom: 1px solid var(--border-0);
    }
    .admin-table td {
      padding: 12px;
      font-size: 15px;
      color: var(--text-0);
      border-bottom: 1px solid var(--border-1);
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--bg-3); }

    /* ================================================================
       LOGIN SCREEN
    ================================================================ */
    .login-screen {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg-0);
      padding: 48px 24px 32px;
    }
    .login-logo-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-bottom: 32px;
    }
    .login-logo-mark {
      width: 72px; height: 72px;
      background: var(--amber-bg);
      border: 2px solid var(--amber);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 8px;
    }
    .login-brand {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 38px;
      letter-spacing: 2px;
      color: var(--amber);
      text-transform: uppercase;
    }
    .login-tagline {
      font-family: var(--font-title);
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .login-form {
      display: flex; flex-direction: column; gap: 14px;
    }
    .login-demo-hint {

/* ================================================================
   PRICING ENGINE
   Formula: sellPrice = SF × (rawRate + gridAdder) × markup × shapeMult × 3 + laborHrs × $200
   Verified 8/8 against COST CALCULATOR 2.27.2026 (CURRENT).xlsx ROM SELL-AT sheet
================================================================ */
function calcPane(pane, supplier, difficulty) {
  const w_in = pane.unit === 'cm' ? parseFloat(pane.width) * 0.393701 : parseFloat(pane.width);
  const h_in = pane.unit === 'cm' ? parseFloat(pane.height) * 0.393701 : parseFloat(pane.height);
  if (!w_in || !h_in || w_in <= 0 || h_in <= 0) return null;
  if (!pane.thickness || !pane.coating || !pane.finish) return null;

  const qty      = pane.qty || 1;
  const SF       = (w_in * h_in) / 144;
  const finishKey = pane.finish === 'annealed' ? 'ann' : 'temp';
  const rateKey   = `${pane.coating}_${finishKey}`;       // e.g. 'c270_ann'
  const sup      = PRICE_CATALOG.suppliers[supplier] || PRICE_CATALOG.suppliers.busick;
  const rawRate  = PRICE_CATALOG.rates[supplier]?.[pane.thickness]?.[rateKey];

  if (rawRate === null || rawRate === undefined) return { requiresQuote: true };

  const gridAdder   = pane.gridEnabled ? sup.gridAdder : 0;
  const shapeMult   = PRICE_CATALOG.shapeMultipliers[pane.shape] || 1.0;
  const glassCost   = SF * (rawRate + gridAdder) * sup.markup * shapeMult;
  const laborHrs    = PRICE_CATALOG.laborDifficulty[difficulty] || 1;
  const laborCost   = laborHrs * PRICE_CATALOG.laborRate;
  const productCost = +(glassCost * 3 * qty).toFixed(2);  // glass sell price (3× cost)
  const laborTotal  = +(laborCost * qty).toFixed(2);
  const lineTotal   = +(productCost + laborTotal).toFixed(2);

  return {
    sqft:          +(SF * qty).toFixed(4),
    productCost,
    laborCost:     laborTotal,
    materialsCost: 0,
    lineTotal,
    requiresQuote: false,
  };
}

function calcJob(panes, supplier, difficulty) {
  let totalProduct = 0, totalLabor = 0;
  const lineItems = panes.map(p => {
    const r = calcPane(p, supplier, difficulty);
    if (!r || r.requiresQuote) return null;
    totalProduct += r.productCost;
    totalLabor   += r.laborCost;
    return { ...p, ...r };
  }).filter(Boolean);
  const grandTotal = totalProduct + totalLabor;
  return {
    lineItems,
    totalProduct:   +totalProduct.toFixed(2),
    totalLabor:     +totalLabor.toFixed(2),
    totalMaterials: 0,
    grandTotal:     +grandTotal.toFixed(2),
  };
}

function toIn(v, unit) { return unit === 'cm' ? parseFloat(v) * 0.393701 : parseFloat(v); }

function fmt(n) {

}
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function genId() {
  return 'q_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function genPaneId() {
  return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
}
function getGlassLabel(id) {
  const legacy = { single: 'Single Pane', double_igu: 'Double Pane IGU', tempered: 'Tempered',
                   laminated: 'Laminated', lowe_double: 'Low-E (Double)', lowe_single: 'Low-E (Single)' };
  return legacy[id] || id;
}
function getPaneLabel(pane) {
  if (pane.glassTypeId) return getGlassLabel(pane.glassTypeId);
  const coatingMap = { clear: 'Clear', hardcoat: 'Hardcoat', c180: 'C180', c270: 'C270/2', c360: 'C360/366' };
  const finishMap  = { annealed: 'Ann.', tempered: 'Temp.' };
  const parts = [pane.thickness, coatingMap[pane.coating], finishMap[pane.finish]].filter(Boolean);
  return parts.join(' · ');
}
function getSupplierName(supplierId) {
  return PRICE_CATALOG.suppliers[supplierId]?.name || supplierId;
}
function getDifficultyLabel(difficulty) {
  const hrs = PRICE_CATALOG.laborDifficulty[difficulty] || 1;
  return `${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)} — ${hrs}hr`;
}
function isLargePaneWarning(w_in, h_in) {
  return w_in > MAX_PANE_SIZE_IN || h_in > MAX_PANE_SIZE_IN;
}
function getCatalogWarning() {
  if (!app.isOnline) {
    const last = new Date(appData.lastSync);
    const days = Math.floor((Date.now() - last) / 86400000);
    if (days >= 7) return `Pricing may be outdated (last synced ${days} days ago) — verify when connected.`;
  }
  return null;
}

/* ================================================================
   NEW QUOTE STATE HELPERS
================================================================ */
function freshPane(from) {
  return {
    thickness:   from?.thickness   || '1/8"',
    coating:     from?.coating     || 'clear',
    finish:      from?.finish      || 'annealed',
    spacer:      from?.spacer      || 'mill',
    spacerOther: '',
    gridEnabled: false,
    gridH: 0, gridV: 0, gridSize: '', gridColor: '',
    shape:    'standard',
    location: '',
    qty:      1,
    width:    '',
    height:   '',
    unit:     from?.unit || 'in',
  };
}

function newDraft() {
  return {
    id: genId(),
    customerName: '',
    customerContact: '',
    contactType: 'phone',
    jobDate: new Date().toISOString(),
    jobNum: '',
    notes: '',
    toolsRequired: '',
    supplier: 'busick',
    difficulty: 'easy',
    panes: [],
    currentPane: freshPane(),
    editingPaneIdx: null,
    step: 1,
    catalogVersion: appData.catalog.version,
    status: 'draft',
  };
}

function draftJobCalc() {
  if (!app.draft || app.draft.panes.length === 0) return null;
  return calcJob(app.draft.panes, app.draft.supplier, app.draft.difficulty);
}

function draftCurrentPaneCalc() {
  const cp = app.draft?.currentPane;
  if (!cp || !cp.thickness || !cp.coating || !cp.finish || !cp.width || !cp.height) return null;
  return calcPane(cp, app.draft.supplier, app.draft.difficulty);
}

/* ================================================================
   RENDER ENGINE
================================================================ */
function render() {
  const el = document.getElementById('app');
  el.innerHTML = '';

  // Customer view overlay
  if (app.customerViewOpen) {
    el.innerHTML = renderCustomerView(app.customerViewQuoteId);
    attachCustomerViewEvents();
    return;
  }

  switch (app.route) {
    case 'login':     el.innerHTML = renderLogin(); break;
    case 'home':      el.innerHTML = renderHome(); break;
    case 'new-quote': el.innerHTML = renderNewQuote(); break;
    case 'review':    el.innerHTML = renderReview(); break;
    case 'sent':      el.innerHTML = renderSent(); break;
    case 'history':   el.innerHTML = renderHistory(); break;
    case 'admin':     el.innerHTML = renderAdmin(); break;
    default:          el.innerHTML = renderLogin();
  }
  attachEvents();
}

================================================================ */
function renderHistory() {
  const u = app.currentUser;
  const search = app.historySearch.toLowerCase();
  const allQuotes = u.role === 'admin'
    ? appData.quotes
    : appData.quotes.filter(q => q.techId === u.id);

  const filtered = allQuotes
    .filter(q => !search || (q.customerName || '').toLowerCase().includes(search))
    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  return `
<div class="screen" style="background:var(--bg-0);">
  <div class="app-header">
    <button class="header-back-btn" id="back-home-from-history">←</button>

      <input class="search-input" id="history-search" placeholder="Search by customer name…" value="${app.historySearch}" />

  <div class="scroll-content scroll-content-pb">
    ${filtered.length === 0 ? `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">${search ? 'No results' : 'No quotes yet'}</div>
        <div class="empty-sub">${search ? 'Try a different search.' : 'New quotes will appear here.'}</div>
      </div>
    ` : filtered.map(q => renderHistoryItem(q, true)).join('')}
  </div>
</div>`;
}

function renderHistoryItem(q, showTech = false) {
  const statusMap = { sent: 'badge-sent', draft: 'badge-draft', flagged: 'badge-flagged', shown: 'badge-shown' };
  const iconMap = { sent: '📤', draft: '📝', flagged: '⚑', shown: '👁' };
  return `

  <div class="history-icon">${iconMap[q.status] || '📋'}</div>
  <div class="history-info">
    <div class="history-customer">${q.customerName || 'No customer name'}</div>
    <div class="history-meta">${fmtDate(q.jobDate)} · ${q.panes.length} pane${q.panes.length !== 1 ? 's' : ''}${showTech && q.techName ? ' · ' + q.techName : ''}</div>

  </div>
  <div>
    <div class="history-price">${fmt(q.grandTotal)}</div>

  </div>
</div>`;
}

      totalLabor: jobCalc.totalLabor,
      totalMaterials: 0,
      grandTotal: jobCalc.grandTotal,
    };
  } else {
    q = appData.quotes.find(x => x.id === quoteId);
    if (!q) return '<div>Quote not found</div>';
    jobCalc = { totalProduct: q.totalProduct, totalLabor: q.totalLabor, totalMaterials: 0, grandTotal: q.grandTotal };
  }

  const supplier    = q.supplier || 'busick';
  const difficulty  = q.difficulty || 'easy';
  const lineItems = q.panes.map((p, i) => {
    const r = calcPane(p, supplier, difficulty);
    return { ...p, ...(r && !r.requiresQuote ? r : {}), idx: i };
  });

  return `
<div class="customer-view">
  <button class="cv-close" id="cv-close-btn">✕</button>

  <div class="cv-logo">FastGlass</div>
  <div class="cv-subtitle">Window Pane Replacement Estimate</div>

  <div class="cv-label">Customer</div>
  <div class="cv-value">${q.customerName || 'Valued Customer'}</div>

  <div class="cv-label">Date</div>
  <div class="cv-value">${fmtDate(q.jobDate)}</div>

  <div class="cv-divider"></div>

  ${lineItems.map((item, i) => `
  <div style="margin-bottom:16px;">
    <div class="cv-label">Pane ${i+1}${item.location?' — '+item.location:''} — ${getPaneLabel(item)}${(item.qty||1)>1?' (×'+item.qty+')':''}</div>
    <div class="cv-line-item"><span class="cv-line-label">${item.width}" × ${item.height}"${item.sqft?' ('+item.sqft.toFixed(2)+' sqft)':''}</span><span class="cv-line-value">${item.productCost?fmt(item.productCost):'QUOTE'}</span></div>
    <div class="cv-line-item"><span class="cv-line-label">Labor</span><span class="cv-line-value">${item.laborCost?fmt(item.laborCost):'—'}</span></div>
  </div>
  `).join('')}

  <div class="cv-divider"></div>

  <div class="cv-line-item"><span class="cv-line-label">Total Glass/Product</span><span class="cv-line-value">${fmt(q.totalProduct)}</span></div>
  <div class="cv-line-item"><span class="cv-line-label">Total Labor</span><span class="cv-line-value">${fmt(q.totalLabor)}</span></div>

  <div class="cv-total" style="border-top:2px solid #000;margin-top:8px;">
    <span class="cv-total-label">ESTIMATE TOTAL</span>
    <span class="cv-total-value">${fmt(q.grandTotal)}</span>
  </div>

  <div class="cv-disclaimer">
    This is an estimate only and is subject to final inspection upon completion of work. Actual costs may vary based on unforeseen conditions discovered during installation. This estimate does not constitute a binding contract. FastGlass reserves the right to adjust pricing based on final inspection findings. Does not include applicable taxes.
  </div>
</div>`;
}

/* ================================================================
   EVENT HANDLERS
================================================================ */
function attachEvents() {
  const on = (id, ev, fn) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener(ev, fn);
  };
  const delegate = (selector, ev, fn) => {
    document.querySelectorAll(selector).forEach(el => el.addEventListener(ev, fn));
  };

  // ---- LOGIN ----
  on('login-btn', 'click', handleLogin);
  on('login-pass', 'keydown', e => { if (e.key === 'Enter') handleLogin(); });
  on('login-user', 'keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass')?.focus(); });

  // ---- HOME ----
  on('start-new-quote', 'click', () => {
    app.draft = newDraft();
    navigate('new-quote');
  });
  on('home-logout-btn', 'click', () => {
    app.currentUser = null;
    app.draft = null;
    navigate('login');
  });
  on('home-admin-btn', 'click', () => navigate('admin'));
  on('home-admin-btn2', 'click', () => navigate('admin'));
  on('view-all-history', 'click', () => navigate('history'));

  // History items on home
  delegate('[data-quote-id]', 'click', e => {
    const id = e.currentTarget.dataset.quoteId;
    viewQuoteFromHistory(id);
  });

  // ---- NEW QUOTE STEP 1 ----
  on('back-home', 'click', () => {
    if (app.draft && (app.draft.customerName || app.draft.panes.length > 0)) {
      if (!confirm('Leave this quote? Progress will be lost.')) return;
    }
    app.draft = null;
    navigate('home');
  });

  // Job-level inputs
  on('cust-name',         'input',  e => app.draft.customerName    = e.target.value);
  on('cust-contact',      'input',  e => app.draft.customerContact = e.target.value);
  on('cust-contact-type', 'change', e => app.draft.contactType     = e.target.value);
  on('job-num',           'input',  e => app.draft.jobNum          = e.target.value);

  // Deferred render for price preview — fires only after the user has stopped interacting
  const deferredRender = () => {
    clearTimeout(app._renderTimer);
    app._renderTimer = setTimeout(() => render(), 600);
  };

  on('pane-location', 'input',  e => { app.draft.currentPane.location = e.target.value; });
  // Width/height: update state on every keystroke, trigger render only on blur/Enter (change event)
  // This prevents any mid-typing DOM rebuilds that cause flash and cursor loss
  on('pane-width',    'input',  e => { app.draft.currentPane.width  = e.target.value; });
  on('pane-height',   'input',  e => { app.draft.currentPane.height = e.target.value; });
  on('pane-width',    'change', e => { app.draft.currentPane.width  = e.target.value; deferredRender(); });
  on('pane-height',   'change', e => { app.draft.currentPane.height = e.target.value; deferredRender(); });
  on('spacer-other',  'input',  e => { app.draft.currentPane.spacerOther = e.target.value; });
  on('grid-size',     'input',  e => { app.draft.currentPane.gridSize  = e.target.value; });
  on('grid-color',    'input',  e => { app.draft.currentPane.gridColor = e.target.value; });

  // Qty stepper — update span directly to avoid full DOM rebuild flash
  on('qty-dec', 'click', () => {
    const cp = app.draft.currentPane;
    cp.qty = Math.max(1, (cp.qty||1) - 1);
    const el = document.getElementById('qty-val');
    if (el) el.textContent = cp.qty;
    deferredRender();
  });
  on('qty-inc', 'click', () => {
    const cp = app.draft.currentPane;
    cp.qty = Math.min(99, (cp.qty||1) + 1);
    const el = document.getElementById('qty-val');
    if (el) el.textContent = cp.qty;
    deferredRender();
  });

  // Unit toggle
  on('unit-in', 'click', () => {
    const cp = app.draft.currentPane;
    if (cp.unit !== 'in') {
      const w = parseFloat(cp.width), h = parseFloat(cp.height);
      if (w) cp.width  = (w * 0.393701).toFixed(1);
      if (h) cp.height = (h * 0.393701).toFixed(1);
      cp.unit = 'in';
      render();
    }
  });
  on('unit-cm', 'click', () => {
    const cp = app.draft.currentPane;
    if (cp.unit !== 'cm') {
      const w = parseFloat(cp.width), h = parseFloat(cp.height);
      if (w) cp.width  = (w / 0.393701).toFixed(1);
      if (h) cp.height = (h / 0.393701).toFixed(1);
      cp.unit = 'cm';
      render();
    }
  });

  // Glass spec chips
  delegate('[data-thickness]', 'click', e => { app.draft.currentPane.thickness = e.currentTarget.dataset.thickness; render(); });
  delegate('[data-coating]',   'click', e => { app.draft.currentPane.coating   = e.currentTarget.dataset.coating;   render(); });
  delegate('[data-finish]',    'click', e => { app.draft.currentPane.finish    = e.currentTarget.dataset.finish;    render(); });
  delegate('[data-spacer]',    'click', e => { app.draft.currentPane.spacer    = e.currentTarget.dataset.spacer;    render(); });
  delegate('[data-shape]',     'click', e => { app.draft.currentPane.shape     = e.currentTarget.dataset.shape;     render(); });

  // Grid toggle
  on('grid-toggle', 'change', e => { app.draft.currentPane.gridEnabled = e.target.checked; render(); });

  // Grid H/V steppers
  delegate('[data-grid-adj]', 'click', e => {
    const axis = e.currentTarget.dataset.gridAdj;
    const dir  = parseInt(e.currentTarget.dataset.dir);
    const cp   = app.draft.currentPane;
    if (axis === 'h') cp.gridH = Math.max(0, (cp.gridH||0) + dir);
    if (axis === 'v') cp.gridV = Math.max(0, (cp.gridV||0) + dir);
    render();
  });

  // Supplier / difficulty selectors
  delegate('[data-supplier]',   'click', e => { app.draft.supplier   = e.currentTarget.dataset.supplier;   render(); });
  delegate('[data-difficulty]', 'click', e => { app.draft.difficulty = e.currentTarget.dataset.difficulty; render(); });

  // Returns true if currentPane has unsaved changes vs the stored pane at editingPaneIdx
  const hasUnsavedPaneChanges = () => {
    const d = app.draft;
    if (d.editingPaneIdx === null || d.editingPaneIdx === undefined) return false;
    const stored = d.panes[d.editingPaneIdx];
    const cp = d.currentPane;
    const keys = ['thickness','coating','finish','spacer','spacerOther','gridEnabled','gridH','gridV','gridSize','gridColor','shape','location','qty','width','height','unit'];
    return keys.some(k => String(cp[k]) !== String(stored[k]));
  };

  // If currentPane has unsaved edits, prompt the user.
  // Returns true (proceed with switch) or false (stay on current pane).
  const confirmPaneSwitch = () => {
    if (!hasUnsavedPaneChanges()) return true;
    const save = confirm('You have unsaved changes to this pane.\n\nTap OK to save and switch, or Cancel to stay.');
    if (save) {
      const d = app.draft;
      d.panes[d.editingPaneIdx] = { id: d.panes[d.editingPaneIdx].id, ...d.currentPane };
    }
    return save; // false = stay on current pane, caller must bail
  };

  // Pane tab — switch to new
  on('pane-tab-new', 'click', () => {
    if (!confirmPaneSwitch()) return; // user chose to stay
    const d = app.draft;
    d.editingPaneIdx = null;
    d.currentPane = freshPane(d.currentPane);
    render();
  });

  // Pane tab — edit existing
  delegate('[data-edit-pane-idx]', 'click', e => {
    const d = app.draft;
    const idx = parseInt(e.currentTarget.dataset.editPaneIdx);
    if (idx === d.editingPaneIdx) return; // already on this pane
    if (!confirmPaneSwitch()) return; // user chose to stay
    d.editingPaneIdx = idx;
    d.currentPane = JSON.parse(JSON.stringify(d.panes[idx]));
    render();
  });

  // Add pane / Update pane
  on('add-pane-btn', 'click', () => {
    const d  = app.draft;
    const cp = d.currentPane;
    const isEditing = d.editingPaneIdx !== null && d.editingPaneIdx !== undefined;

    if (isEditing) {
      // Update existing pane in place
      d.panes[d.editingPaneIdx] = { id: d.panes[d.editingPaneIdx].id, ...cp };
      d.editingPaneIdx = null;
      d.currentPane = freshPane(cp);
      render();
      return;
    }

    if (d.panes.length >= 20) { alert('Maximum 20 panes per quote.'); return; }
    d.panes.push({ id: genPaneId(), ...cp });
    d.currentPane = freshPane(cp);
    render();
  });

  // Review quote (from step 1) — auto-add current pane if complete
  on('review-quote-btn', 'click', () => {
    const d  = app.draft;
    const cp = d.currentPane;
    const isEditing = d.editingPaneIdx !== null && d.editingPaneIdx !== undefined;
    if (!isEditing && cp.thickness && cp.coating && cp.finish &&
        parseFloat(cp.width) > 0 && parseFloat(cp.height) > 0) {
      const r = draftCurrentPaneCalc();
      if (r && !r.requiresQuote) {
        d.panes.push({ id: genPaneId(), ...cp });
        d.currentPane = freshPane(cp);
        d.editingPaneIdx = null;
      }
    }
    if (d.panes.length === 0) return;
    d.step = 2;
    navigate('new-quote');
  });

  // Flag for office review
  on('flag-large-pane', 'click', () => {
    const finalQuote = finalizeDraft('flagged');
    navigate('sent', { quoteId: finalQuote.id });
  });

  // ---- STEP 2 ----
  on('back-step1', 'click', () => {
    app.draft.step = 1;
    navigate('new-quote');
  });
  on('add-another-pane-btn', 'click', () => {
    app.draft.editingPaneIdx = null;
    app.draft.currentPane = freshPane(app.draft.currentPane);
    app.draft.step = 1;
    navigate('new-quote');
  });
  on('proceed-to-review', 'click', () => {
    app.draft.step = 3;
    navigate('review');
  });
  delegate('[data-remove-pane]', 'click', e => {
    const pid = e.currentTarget.dataset.removePane;
    app.draft.panes = app.draft.panes.filter(p => p.id !== pid);
    if (app.draft.editingPaneIdx !== null) app.draft.editingPaneIdx = null;
    if (app.draft.panes.length === 0) {
      app.draft.step = 1;
      navigate('new-quote');
    } else {
      render();
    }
  });

  // ---- REVIEW ----
  on('back-to-pane-list', 'click', () => {
    app.draft.step = 2;
    navigate('new-quote');
  });

  on('review-tools', 'input', e => { if (app.draft) app.draft.toolsRequired = e.target.value; });
  on('review-notes', 'input', e => { if (app.draft) app.draft.notes = e.target.value; });

  on('show-customer-btn', 'click', () => {
    app.customerViewOpen = true;
    app.customerViewQuoteId = '__draft__';
    render();
  });

  on('send-quote-btn', 'click', () => {
    app.sendModal = true;
    render();
  });

  on('flag-review-btn', 'click', () => {
    const finalQuote = finalizeDraft('flagged');
    navigate('sent', { quoteId: finalQuote.id });
  });

  // Send modal
  on('send-modal-overlay', 'click', e => {
    if (e.target.id === 'send-modal-overlay') { app.sendModal = false; render(); }
  });
  on('close-send-modal', 'click', () => { app.sendModal = false; render(); });
  on('send-sms-btn', 'click', () => {
    const finalQuote = finalizeDraft('sent');
    navigate('sent', { quoteId: finalQuote.id });
  });
  on('show-screen-btn', 'click', () => {
    // Show presentation first, then save as 'shown' when closed
    app.pendingSaveAsShown = true;
    app.customerViewOpen = true;
    app.customerViewQuoteId = '__draft__';
    app.sendModal = false;
    render();
  });
  on('send-with-contact-btn', 'click', () => {
    const contact = document.getElementById('modal-contact')?.value;
    const type = document.getElementById('modal-contact-type')?.value;
    if (!contact) { alert('Please enter a contact to send to.'); return; }
    app.draft.customerContact = contact;
    app.draft.contactType = type;
    const finalQuote = finalizeDraft('sent');
    navigate('sent', { quoteId: finalQuote.id });
  });

  // ---- SENT ----
  on('start-new-quote-from-sent', 'click', () => {
    app.draft = newDraft();
    navigate('new-quote');
  });
  on('view-history-btn', 'click', () => navigate('history'));

  // ---- HISTORY ----
  on('back-home-from-history', 'click', () => navigate('home'));
  on('history-search', 'input', e => {
    app.historySearch = e.target.value;
    render();
  });

  // ---- ADMIN ----
  on('back-home-admin', 'click', () => navigate('home'));
  delegate('[data-tab]', 'click', e => {
    app.activeTab = parseInt(e.currentTarget.dataset.tab);
    app.editMode = null;
    render();
  });

}

function attachCustomerViewEvents() {
  const closeBtn = document.getElementById('cv-close-btn');
  if (closeBtn) {
    closeBtn.addEventListener('click', () => {
      if (app.pendingSaveAsShown) {
        const finalQuote = finalizeDraft('shown');
        app.pendingSaveAsShown = false;
        app.customerViewOpen = false;
        app.customerViewQuoteId = null;
        navigate('sent', { quoteId: finalQuote.id });
      } else {
        app.customerViewOpen = false;
        app.customerViewQuoteId = null;
        render();
      }
    });
  }
}

/* ================================================================
   AUTH
================================================================ */
function handleLogin() {
  const username = document.getElementById('login-user')?.value.trim();
  const password = document.getElementById('login-pass')?.value;
  const errEl = document.getElementById('login-error');

  const user = appData.users.find(u => u.username === username && u.password === password);
  if (user) {
    app.currentUser = user;
    navigate('home');
  } else {
    if (errEl) errEl.textContent = 'Invalid username or password. Try tech1/demo or admin/demo.';
  }
}

/* ================================================================
   FINALIZE DRAFT → SAVE QUOTE
================================================================ */
function finalizeDraft(status) {
  const d = app.draft;
  const jobCalc = calcJob(d.panes, d.supplier, d.difficulty);
  const quote = {
    id: d.id,
    techId: app.currentUser.id,
    techName: app.currentUser.name,
    customerName: d.customerName,
    customerContact: d.customerContact,
    contactType: d.contactType,
    jobDate: d.jobDate,
    jobNum: d.jobNum || '',
    notes: d.notes || '',
    toolsRequired: d.toolsRequired || '',
    status: status,
    supplier: d.supplier,
    difficulty: d.difficulty,
    panes: d.panes,
    totalProduct: jobCalc.totalProduct,
    totalLabor: jobCalc.totalLabor,
    totalMaterials: jobCalc.totalMaterials,
    grandTotal: jobCalc.grandTotal,
    catalogVersion: d.catalogVersion,
    createdAt: new Date().toISOString(),
    syncedAt: app.isOnline ? new Date().toISOString() : null,
  };

  // Remove any existing quote with same id (resend scenario)
  appData.quotes = appData.quotes.filter(q => q.id !== quote.id);
  appData.quotes.unshift(quote);
  saveState(appData);
  app.draft = null;
  return quote;
}

/* ================================================================
   VIEW QUOTE FROM HISTORY (REOPEN)
================================================================ */
function viewQuoteFromHistory(quoteId) {
  const q = appData.quotes.find(x => x.id === quoteId);
  if (!q) return;
  // Rebuild a draft from the historical quote for re-presentation
  app.draft = {
    id: q.id,
    customerName: q.customerName || '',
    customerContact: q.customerContact || '',
    contactType: q.contactType || 'phone',
    jobDate: q.jobDate,
    jobNum: q.jobNum || '',
    notes: q.notes || '',
    toolsRequired: q.toolsRequired || '',
    supplier: q.supplier || 'busick',
    difficulty: q.difficulty || 'easy',
    panes: JSON.parse(JSON.stringify(q.panes)), // deep clone — prevent draft edits from corrupting saved quote
    currentPane: freshPane(),
    editingPaneIdx: null,
    step: 3,
    catalogVersion: q.catalogVersion,
    status: q.status,
  };
  navigate('review');
}

/* ================================================================
   ONLINE/OFFLINE DETECTION
================================================================ */
window.addEventListener('online', () => {
  app.isOnline = true;
  appData.lastSync = new Date().toISOString();
  saveState(appData);
  render();
});
window.addEventListener('offline', () => {
  app.isOnline = false;
  render();
});

/* ================================================================
   INIT
================================================================ */
function init() {
  // Check for saved session
  const savedSession = sessionStorage.getItem('fg_user');
  if (savedSession) {
    try {
      app.currentUser = JSON.parse(savedSession);
    } catch {}
  }

  render();

  // Save session on user change
  const originalNavigate = navigate;
}

// Persist session across page refreshes
window.addEventListener('beforeunload', () => {
  if (app.currentUser) {
    sessionStorage.setItem('fg_user', JSON.stringify(app.currentUser));
  } else {
    sessionStorage.removeItem('fg_user');
  }
});

init();
</script>
